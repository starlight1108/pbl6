name: 🐛 Bug 报告
description: 提交 Bug 帮助我们改进系统
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间提交 Bug 报告！请尽可能详细地填写以下信息。

  - type: dropdown
    id: module
    attributes:
      label: 所属模块
      description: 该 Bug 出现在哪个功能模块？
      multiple: false
      options:
        - 🔐 用户认证（注册/登录/个人信息）
        - 📦 商品管理（发布/浏览/搜索/评论/收藏）
        - 💬 交易沟通（站内消息/通知）
        - 📋 订单管理（下单/已售/交易记录）
        - 🎨 前端界面/UI
        - ⚙️ 后端服务/API
        - 🔗 前后端交互
        - 🏠 首页/其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述这个 Bug 是什么。
      placeholder: 例如：点击「发布商品」按钮后页面无响应...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现这个 Bug？
      placeholder: |
        1. 访问『...』
        2. 点击『...』
        3. 滚动到『...』
        4. 看到错误
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么？
      placeholder: 期望正常跳转到发布成功页面
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 页面卡住，控制台报错 500
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / 录屏
      description: 如有截图或录屏，请附上以帮助解释问题。
      placeholder: 拖放图片到此处或粘贴链接
    validations:
      required: false

  - type: input
    id: api-response
    attributes:
      label: API 响应（如有）
      description: 如果涉及后端接口，请粘贴接口返回的错误信息。
      placeholder: {"code": 500, "message": "Internal Server Error"}
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 相关日志输出
      description: 请复制粘贴相关的前端/后端日志输出。
      render: shell
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: 运行环境
      description: Bug 出现在哪个环境？
      options:
        - 本地开发环境
        - 测试服务器
        - 生产环境
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: 浏览器（前端 Bug 填写）
      description: 例如 Chrome 120.0、Edge 120.0、Firefox 121.0 等
      placeholder: Chrome 120.0
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: 操作系统
      description: 例如 Windows 11、macOS 14、Ubuntu 22.04 等
      placeholder: Windows 11
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充说明
      description: 其他有助于排查问题的上下文信息。
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: 确认
      options:
        - label: 我已搜索已有 issues，未找到相同的 Bug 报告
          required: true
        - label: 我已按照模板填写所有必要信息
          required: true
